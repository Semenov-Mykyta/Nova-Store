<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title>Reset Password – NovaStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages.css" />

    <style>
        .reset-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-card {
            width: 100%;
            max-width: 420px;
            padding: 30px;
            border-radius: 16px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            opacity: 0.7;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .form-group {
            position: relative;
            margin-bottom: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
        }

        .eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.7;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: #d7b46a;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        #msg {
            margin-top: 12px;
            font-size: 14px;
            opacity: 0.8;
            min-height: 18px;
        }
    </style>
</head>

<body>

<div class="reset-wrap">
    <div class="reset-card glass-card">

        <div class="title">Reset Password</div>
        <div class="subtitle">Enter your new password</div>

        <form id="reset-form">

            <div class="form-group">
                <input id="password" type="password" placeholder="New password" />
                <span id="toggle-password" class="eye">👁</span>
            </div>

            <div class="form-group">
                <input id="confirm" type="password" placeholder="Confirm password" />
                <span id="toggle-confirm" class="eye">👁</span>
            </div>

            <button type="submit">Update Password</button>

            <div id="msg"></div>

        </form>

    </div>
</div>

<script defer src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script defer src="js/auth-core.js"></script>
<script defer src="js/password-reset.js"></script>

</body>
</html>
