<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <script defer src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="js/auth-core.js"></script>
    <script defer src="js/password-reset.js"></script>

    <style>
        body {
            margin:0;
            font-family: Arial;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background: radial-gradient(circle at top, #1a1f2e, #0f1115);
            color:white;
        }

        .card {
            width:360px;
            background:#181c24;
            padding:28px;
            border-radius:16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            text-align:center;
        }

        h2 {
            margin-bottom:10px;
        }

        p {
            color:#9ca3af;
            font-size:14px;
            margin-bottom:20px;
        }

        input {
            width:100%;
            padding:12px;
            border-radius:10px;
            border:none;
            outline:none;
            margin-bottom:12px;
            background:#0f1115;
            color:white;
        }

        button {
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#d7b46a;
            cursor:pointer;
            font-weight:bold;
        }

        button:disabled {
            opacity:0.5;
            cursor:not-allowed;
        }

        .status {
            margin-top:12px;
            font-size:13px;
            min-height:18px;
        }

        .success { color:#22c55e; }
        .error { color:#ef4444; }
        .loading { color:#facc15; }

    </style>
</head>

<body>

<div class="card">

    <h2>Reset Password</h2>
    <p>Enter your new password below</p>

    <input type="password" id="password" placeholder="New password">

    <button id="reset-btn">Update password</button>

    <div class="status" id="msg"></div>

</div>

</body>
</html>
