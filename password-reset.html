<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title>Password Reset – NovaStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <script>
        (function () {
            const THEME_KEY = "novastore_theme";
            const stored = localStorage.getItem(THEME_KEY);

            const theme = stored === "light" || stored === "dark"
                ? stored
                : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/sections.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script defer src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script defer src="js/translations.js"></script>
    <script defer src="js/auth-core.js"></script>
    <script defer src="js/password-reset.js"></script>
    <script defer src="js/cart.js"></script>
    <script defer src="js/main.js"></script>
    <script defer src="js/navbar-auth.js"></script>
</head>
<body>
<header class="header glass-nav fade-down">
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="assets/logo.svg" alt="NovaStore Logo" />
            <span class="logo-text">NovaStore</span>
        </a>
        <nav class="nav" id="nav">
            <a href="index.html" data-i18n="nav.home"></a>
            <a href="shop.html" data-i18n="nav.shop"></a>
            <a href="support.html" data-i18n="nav.support"></a>
            <a href="my-orders.html" id="my-orders-link" data-i18n="nav.orders"></a>
        </nav>
        <div class="header-actions">
            <button class="btn-icon" id="lang-toggle"><span id="lang-label">EN</span></button>
            <button class="btn-icon" id="theme-toggle"><span class="theme-icon">🌙</span></button>
            <button class="btn-icon cart-btn" id="cart-toggle">
                <span class="cart-icon">🛒</span>
                <span class="cart-count" id="cart-count">0</span>
            </button>
            <button class="burger" id="burger"><span></span><span></span><span></span></button>
        </div>
    </div>
</header>

<aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
        <h2 data-i18n="cart.title"></h2>
        <button class="btn-icon" id="cart-close">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
        <div class="cart-total">
            <span data-i18n="cart.total"></span>
            <span id="cart-total-amount">€0.00</span>
        </div>
        <button class="btn primary full" data-i18n="cart.checkout"></button>
    </div>
</aside>

<main class="fade-in">
    <section class="section auth-section">
        <div class="container auth-layout glass-card">
            <div class="auth-forms">
                <form id="reset-password-form" class="auth-form" novalidate>
                    <h1 data-i18n="auth.reset_title"></h1>
                    <p class="text-muted" data-i18n="auth.reset_subtitle"></p>

                    <div class="form-group">
                        <label for="new-password" data-i18n="auth.new_password"></label>
                        <input type="password" id="new-password" autocomplete="new-password" required />
                    </div>

                    <div class="form-group">
                        <label for="confirm-password" data-i18n="auth.confirm_password"></label>
                        <input type="password" id="confirm-password" autocomplete="new-password" required />
                    </div>

                    <button type="submit" class="btn primary full ripple" data-i18n="auth.reset_password_btn"></button>
                    <a href="login.html" class="link-btn auth-link" data-i18n="auth.back_to_login"></a>
                    <div class="auth-status" id="reset-password-status"></div>
                </form>

                <form id="reset-request-form" class="auth-form active" novalidate>
                    <h1 data-i18n="auth.reset_request_title"></h1>
                    <p class="text-muted" data-i18n="auth.reset_request_subtitle"></p>

                    <div class="form-group">
                        <label for="reset-email" data-i18n="auth.email"></label>
                        <input type="email" id="reset-email" autocomplete="email" required />
                    </div>

                    <button type="submit" class="btn primary full ripple" data-i18n="auth.send_reset_link_btn"></button>
                    <a href="login.html" class="link-btn auth-link" data-i18n="auth.back_to_login"></a>
                    <div class="auth-status" id="reset-request-status"></div>
                </form>
            </div>
        </div>
    </section>
</main>

<footer class="footer fade-in">
    <div class="container footer-inner">
        <div class="footer-col">
            <h4>NovaStore</h4>
            <p data-i18n="footer.tagline"></p>
        </div>
        <div class="footer-col">
            <h4 data-i18n="footer.links"></h4>
            <a href="shop.html" data-i18n="footer.shop"></a>
            <a href="support.html" data-i18n="footer.support"></a>
            <a href="legal.html#terms" data-i18n="footer.terms"></a>
            <a href="legal.html#privacy" data-i18n="footer.privacy"></a>
        </div>
        <div class="footer-col">
            <h4 data-i18n="footer.contact"></h4>
            <p>support@novastore.app</p>
        </div>
    </div>
</footer>
</body>
</html>
