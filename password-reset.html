<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title>Reset Password – NovaStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />

    <!-- Theme -->
    <script>
        (function () {
            const THEME_KEY = "novastore_theme";
            const stored = localStorage.getItem(THEME_KEY);

            const theme = stored === "light" || stored === "dark"
                ? stored
                : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/responsive.css" />

    <style>
        .reset-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .reset-card {
            width: 100%;
            max-width: 420px;
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(14px);
        }

        .reset-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .reset-subtitle {
            opacity: 0.7;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
        }

        .toggle-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.7;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #d7b46a;
            font-weight: 600;
            cursor: pointer;
        }

        .msg {
            margin-top: 12px;
            font-size: 14px;
            min-height: 18px;
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="reset-wrapper">
    <div class="reset-card glass-card">

        <div class="reset-title">Reset Password</div>
        <div class="reset-subtitle">Enter your new password</div>

        <form id="reset-form">

            <div class="form-group">
                <input id="password" type="password" placeholder="New password" />
                <span class="toggle-eye" id="toggle-password">👁</span>
            </div>

            <div class="form-group">
                <input id="confirm" type="password" placeholder="Confirm password" />
                <span class="toggle-eye" id="toggle-confirm">👁</span>
            </div>

            <button class="btn" type="submit">Update Password</button>

            <div class="msg" id="msg"></div>
        </form>

    </div>
</div>

<!-- Supabase -->
<script defer src="https://unpkg.com/@supabase/supabase-js@2"></script>

<!-- Your auth core -->
<script defer src="js/auth-core.js"></script>

<!-- Reset logic -->
<script defer src="js/password-reset.js"></script>

</body>
</html>
