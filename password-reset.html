<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Reset Password – NovaStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1115;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 420px;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 26px;
        }

        p {
            margin: 0 0 20px;
            color: #aaa;
            font-size: 14px;
        }

        .field {
            position: relative;
            margin-bottom: 12px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            font-size: 14px;
        }

        .toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
        }

        .toggle:hover {
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: #d7b46a;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .msg {
            margin-top: 12px;
            font-size: 13px;
            text-align: center;
            color: #aaa;
        }

        .error {
            color: #ff6b6b;
        }

        .success {
            color: #4cd137;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Reset Password</h1>
    <p>Enter your new password below</p>

    <form id="reset-form">

        <div class="field">
            <input id="password" type="password" placeholder="New password" />
            <button type="button" class="toggle" id="toggle-password">👁</button>
        </div>

        <div class="field">
            <input id="confirm" type="password" placeholder="Confirm password" />
            <button type="button" class="toggle" id="toggle-confirm">👁</button>
        </div>

        <button type="submit">Update Password</button>

        <div id="msg" class="msg"></div>
    </form>
</div>

<script src="js/auth-core.js"></script>
<script src="js/password-reset.js"></script>

</body>
</html>
