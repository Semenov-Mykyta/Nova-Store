<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title>Password Reset – NovaStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />

    <!-- Theme init -->
    <script>
        (function () {
            const stored = localStorage.getItem("novastore_theme");
            const theme =
                stored === "light" || stored === "dark"
                    ? stored
                    : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages.css" />

    <!-- Supabase -->
    <script defer src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <!-- Your core -->
    <script defer src="js/auth-core.js"></script>
    <script defer src="js/password-reset.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1a1f2e, #0f1115);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 380px;
            background: rgba(24, 28, 36, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 22px;
        }

        p {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            margin-bottom: 12px;
            background: #0f1115;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #d7b46a;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            min-height: 18px;
        }

        .error { color: #ef4444; }
        .success { color: #22c55e; }
        .info { color: #facc15; }

        .link {
            display: block;
            margin-top: 15px;
            font-size: 13px;
            color: #d7b46a;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Reset Password</h1>
    <p>Enter your new password</p>

    <input type="password" id="password" placeholder="New password" />
    <input type="password" id="confirm" placeholder="Confirm password" />

    <button id="reset-btn">Update password</button>

    <div class="status" id="msg"></div>

    <a href="login.html" class="link">Back to login</a>

</div>

</body>
</html>
