<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <script defer src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="js/auth-core.js"></script>
    <script defer src="js/password-reset.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f1115;
            color: white;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: #181c24;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #d7b46a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .msg {
            margin-top: 10px;
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Reset Password</h2>

    <input type="password" id="password" placeholder="New password">

    <button id="reset-btn">Update password</button>

    <div class="msg" id="msg"></div>
</div>

</body>
</html>
