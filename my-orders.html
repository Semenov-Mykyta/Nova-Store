<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title>My Orders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <script>
        (function () {
            const THEME_KEY = "novastore_theme";
            const stored = localStorage.getItem(THEME_KEY);

            const theme = stored === "light" || stored === "dark"
                ? stored
                : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
        <script>
            (function () {
                function hideLoader() {
                    var loader = document.getElementById("page-loader");
                    if (loader) loader.classList.add("hidden");
                }

                if (document.readyState === "loading") {
                    document.addEventListener("DOMContentLoaded", function () {
                        setTimeout(hideLoader, 250);
                    }, { once: true });
                } else {
                    setTimeout(hideLoader, 250);
                }

                window.addEventListener("load", function () {
                    setTimeout(hideLoader, 250);
                }, { once: true });

                setTimeout(hideLoader, 2500);
            })();
        </script>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/sections.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/responsive.css" />
        <script defer src="js/translations.js"></script>
        <script defer src="js/auth-core.js"></script>
        <script defer src="js/cart.js"></script>
        <script defer src="js/main.js"></script>
        <script defer src="js/navbar-auth.js"></script>
        <script defer src="js/my-orders.js"></script>
        <script async src="https://unpkg.com/@supabase/supabase-js@2" onload="window.NovaAuth && window.NovaAuth.handleSupabaseLoaded && window.NovaAuth.handleSupabaseLoaded()"></script>
        <script async src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js" onload="window.dispatchEvent(new Event('nova:emailjs-loaded'))"></script>
    </head>

<body>
<div class="page-loader" id="page-loader">
    <div class="loader-glass"></div>
</div>

<header class="header glass-nav fade-down">
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="assets/logo.svg" alt="NovaStore Logo" />
            <span class="logo-text">NovaStore</span>
        </a>

        <nav class="nav" id="nav">
            <a href="index.html" data-i18n="nav.home"></a>
            <a href="shop.html" data-i18n="nav.shop"></a>
            <a href="support.html" data-i18n="nav.support"></a>
            <a href="my-orders.html" id="my-orders-link" class="active" data-i18n="nav.orders"></a>
        </nav>

        <div class="header-actions">
            <button class="btn-icon" id="lang-toggle" aria-label="Language">
                <span id="lang-label">EN</span>
            </button>

            <button class="btn-icon" id="theme-toggle" aria-label="Theme">
                <span class="theme-icon">🌙</span>
            </button>

            <a href="login.html" class="btn ghost" data-i18n="nav.login"></a>

            <div class="nav-user-badge" id="nav-user-badge" hidden>
                <span class="nav-user-dot"></span>
                <span class="nav-user-email-text" id="nav-user-email-text"></span>
            </div>

            <button class="btn-icon cart-btn" id="cart-toggle" aria-label="Cart">
                <span class="cart-icon">🛒</span>
                <span class="cart-count" id="cart-count">0</span>
            </button>

            <button class="burger" id="burger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>
</header>

<aside class="cart-sidebar" id="cart-sidebar" aria-label="Shopping cart">
    <div class="cart-header">
        <h2 data-i18n="cart.title"></h2>
        <button class="btn-icon" id="cart-close">✕</button>
    </div>

    <div class="cart-items" id="cart-items"></div>

    <div class="cart-footer">
        <div class="cart-total">
            <span data-i18n="cart.total"></span>
            <span id="cart-total-amount">€0.00</span>
        </div>

        <button class="btn primary full" data-i18n="cart.checkout"></button>
    </div>
</aside>

<main>
    <section class="section fade-in">
        <div class="container">
            <div class="section-header">
                <div>
                    <h1>My Orders</h1>
                    <p>Your recent NovaStore orders.</p>
                </div>
            </div>

            <div id="orders-container">
                <p>Loading orders...</p>
            </div>
        </div>
    </section>
</main>
</body>
</html>
